<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Realm Engine — A deep single-player browser RPG with 10 classes, 30+ enemies, turn-based combat, and zero external assets. Free forever.">
  <meta name="theme-color" content="#060610">
  <meta name="color-scheme" content="dark">
  <title>Realm Engine — Browser RPG</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23060610'/><text x='16' y='24' font-size='22' text-anchor='middle' fill='%23f0c040'>R</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div id="loading-logo">
      <h1>REALM ENGINE</h1>
      <div class="subtitle">A Browser RPG Adventure</div>
    </div>

    <div class="divider">
      <div class="diamond"></div>
    </div>

    <div id="loading-bar-container">
      <div id="loading-bar-bg">
        <div id="loading-bar"></div>
      </div>
    </div>
    <div id="loading-text">Initializing<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></div>

    <div id="loading-tip"></div>
    <div id="loading-footer">100% Client-Side &bull; Zero External Assets &bull; Free Forever</div>
    <div id="version-badge">v2.0</div>
  </div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Scripts — load order matters -->
  <!-- Engine -->
  <script src="engine/utils.js"></script>
  <script src="engine/core.js"></script>
  <script src="engine/input.js"></script>
  <script src="engine/renderer.js"></script>
  <script src="engine/audio.js"></script>
  <script src="engine/particles.js"></script>
  <script src="engine/save.js"></script>
  <script src="engine/autoplay.js"></script>

  <!-- Sprites -->
  <script src="sprites/sprite-gen.js"></script>
  <script src="sprites/animations.js"></script>

  <!-- World -->
  <script src="world/tileset.js"></script>
  <script src="world/zones.js"></script>
  <script src="world/world-manager.js"></script>
  <script src="world/map-renderer.js"></script>
  <script src="world/minimap.js"></script>
  <script src="world/day-night.js"></script>

  <!-- ECS -->
  <script src="ecs/ecs.js"></script>
  <script src="ecs/components.js"></script>
  <script src="ecs/systems.js"></script>

  <!-- Data -->
  <script src="data/classes.js"></script>
  <script src="data/items.js"></script>
  <script src="data/enemies.js"></script>
  <script src="data/crafting.js"></script>
  <script src="data/npcs.js"></script>
  <script src="data/quests.js"></script>
  <script src="data/allies.js"></script>
  <script src="data/pets.js"></script>
  <script src="data/achievements.js"></script>
  <script src="data/bestiary.js"></script>
  <script src="data/enchanting.js"></script>
  <script src="data/fishing.js"></script>
  <script src="data/daily.js"></script>
  <script src="data/newgame-plus.js"></script>

  <!-- Combat -->
  <script src="combat/abilities.js"></script>
  <script src="combat/enemy-ai.js"></script>
  <script src="combat/combat.js"></script>

  <!-- UI -->
  <script src="ui/dialogue.js"></script>
  <script src="ui/quest-log.js"></script>
  <script src="ui/hud.js"></script>
  <script src="ui/inventory.js"></script>
  <script src="ui/menus.js"></script>

  <!-- Main init -->
  <script>
    (function () {
      const loadingBar = document.getElementById('loading-bar');
      const loadingText = document.getElementById('loading-text');
      const loadingScreen = document.getElementById('loading-screen');
      const loadingTip = document.getElementById('loading-tip');
      const canvas = document.getElementById('game-canvas');

      const tips = [
        'Tip: Elemental weaknesses deal 1.5x damage!',
        'Tip: Fishing at different zones yields different fish.',
        'Tip: Complete all daily challenges for bonus gold.',
        'Tip: Pets gain XP after each battle.',
        'Tip: Enchanting adds permanent bonuses to equipment.',
        'Tip: Some enemies are weak to light magic.',
        'Tip: Recruit allies from NPCs in each zone.',
        'Tip: Craft a Fishing Rod to unlock fishing.',
        'Tip: The Bestiary tracks all monsters you encounter.',
        'Tip: Higher luck increases rare item drop rates.',
        'Tip: Combo attacks deal bonus elemental damage.',
        'Tip: Try entering a special code on the title screen...'
      ];
      loadingTip.textContent = tips[Math.floor(Math.random() * tips.length)];

      function setProgress(pct, text) {
        loadingBar.style.width = pct + '%';
        loadingText.innerHTML = text + '<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';
      }

      async function boot() {
        try {
          setProgress(10, 'Initializing engine');

          // Init renderer
          Renderer.init(canvas);

          setProgress(20, 'Generating sprites');
          await new Promise(r => setTimeout(r, 50));

          // Generate all sprites
          SpriteGen.generateAll();

          setProgress(45, 'Setting up input');
          Input.init(canvas);

          setProgress(55, 'Initializing audio');
          AudioManager.init();

          setProgress(65, 'Setting up particles');
          Particles.init();
          Minimap.init();

          setProgress(75, 'Initializing game systems');
          Achievements.init();
          Bestiary.init();
          DailyChallenges.init();
          NewGamePlus.init();

          setProgress(85, 'Registering systems');
          Systems.registerAll();

          setProgress(95, 'Preparing world');

          // Register update callbacks
          Core.onUpdate((dt) => {
            // Auto-play bot injects virtual inputs before game logic
            if (typeof AutoPlay !== 'undefined') AutoPlay.update(dt);

            if (GS.state === GameStates.PLAY) {
              ECS.runSystems(dt);
              WorldManager.update(dt);
              Tileset.update(dt);
              Quests.checkLevelQuests();
            }

            // State-specific updates
            if (GS.state === GameStates.PLAY) {
              // Fishing input
              const fishState = Fishing.getState();
              if (fishState.active) {
                // Space to reel during bite phase
                if (Input.actionPressed(Input.Actions.CONFIRM) && fishState.phase === 'bite') {
                  Fishing.onReel();
                }
                // ESC to cancel fishing
                if (Input.actionPressed(Input.Actions.CANCEL)) {
                  Fishing.cancel();
                }
              } else {
                // Start fishing when pressing E near water
                if (Input.actionPressed(Input.Actions.INTERACT)) {
                  if (WorldManager.isFacingWater(GS.player)) {
                    Fishing.startFishing();
                  }
                }
              }

              // Quickslot keys 1-4 — use skill outside combat
              for (let si = 0; si < 4; si++) {
                const slotAction = [Input.Actions.SLOT1, Input.Actions.SLOT2, Input.Actions.SLOT3, Input.Actions.SLOT4][si];
                if (Input.actionPressed(slotAction) && GS.player.skills && GS.player.skills[si]) {
                  const skill = GS.player.skills[si];
                  if (skill.type === 'heal' && GS.player.stats.mp >= skill.mpCost) {
                    const healAmt = Math.floor(GS.player.stats.int * (skill.power || 1));
                    GS.player.stats.hp = Math.min(GS.player.stats.maxHp, GS.player.stats.hp + healAmt);
                    GS.player.stats.mp -= skill.mpCost;
                    Core.addNotification(`${skill.name}: +${healAmt} HP`, 2);
                    if (typeof AudioManager !== 'undefined') AudioManager.playSFX('heal');
                    if (typeof Particles !== 'undefined') Particles.emit('heal', Renderer.getWidth() / 2, Renderer.getHeight() / 2, 10);
                  } else if (skill.type === 'buff' && GS.player.stats.mp >= skill.mpCost) {
                    GS.player.stats.mp -= skill.mpCost;
                    Core.addNotification(`${skill.name} activated!`, 2);
                    if (typeof AudioManager !== 'undefined') AudioManager.playSFX('buff');
                  } else if (GS.player.stats.mp < skill.mpCost) {
                    Core.addNotification('Not enough MP!', 1.5);
                  } else {
                    Core.addNotification('Skills usable in combat', 1.5);
                  }
                }
              }

              // Keyboard shortcuts
              if (!fishState.active) {
                if (Input.actionPressed(Input.Actions.INVENTORY)) {
                  Core.setState(GameStates.INVENTORY);
                }
                if (Input.actionPressed(Input.Actions.MENU)) {
                  Core.setState(GameStates.PAUSED);
                }
                if (Input.actionPressed(Input.Actions.QUEST_LOG)) {
                  Core.setState(GameStates.QUEST_LOG);
                }
              }
            }

            Combat.update(dt);
            Dialogue.update(dt);
            Inventory.update(dt);
            QuestLog.update(dt);
            Menus.update(dt);
            Particles.update(dt);
            Fishing.update(dt);
            Systems.NotificationSystem.update(dt);

            // Ambient particles based on zone
            if (GS.state === GameStates.PLAY) {
              const zone = WorldManager.getZone();
              if (zone) {
                if (zone.id === 'frostpeak') Particles.spawnAmbient('snow', dt);
                else if (zone.id === 'whisperwood') Particles.spawnAmbient('firefly', dt);
                else if (zone.id === 'sunscorch') Particles.spawnAmbient('dust', dt);
                else if (zone.id === 'eldergrove' && typeof DayNight !== 'undefined' && DayNight.getTimeOfDay().hours >= 18) Particles.spawnAmbient('firefly', dt);
                else if (zone.id === 'crystal_sanctum') Particles.spawnAmbient('firefly', dt);
                else if (zone.id === 'shadowmere') Particles.spawnAmbient('dust', dt);
                else if (zone.id === 'abyss') Particles.spawnAmbient('dust', dt);
              }
            }
          });

          // Register render callbacks
          Core.onRender((dt) => {
            Renderer.clear();

            if (GS.state === GameStates.PLAY || GS.state === GameStates.DIALOGUE ||
                GS.state === GameStates.INVENTORY || GS.state === GameStates.QUEST_LOG ||
                GS.state === GameStates.PAUSED) {
              // World rendering
              MapRenderer.render();
              MapRenderer.renderExits();
              Systems.EntityRenderSystem.update(dt);
              DayNight.render();
              Particles.render();
              HUD.render();
            }

            // Overlay UIs
            Combat.render();
            Dialogue.render();
            Inventory.render();
            QuestLog.render();
            Menus.render();
            Fishing.render();

            // Clear input flags at end of frame
            Input.endFrame();
          });

          setProgress(100, 'Ready!');
          await new Promise(r => setTimeout(r, 300));

          // Hide loading screen
          loadingScreen.classList.add('hidden');

          // Start at title screen
          Core.setState(GameStates.MENU);
          AudioManager.playMusic('town');

          // Start game loop
          await Core.init();

        } catch (err) {
          setProgress(0, 'Error: ' + err.message);
          console.error('Boot error:', err);
        }
      }

      boot();
    })();
  </script>
</body>
</html>
